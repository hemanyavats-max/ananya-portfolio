<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ananya Gupta - Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf6f4;
    --bg2: #f5ede8;
    --pink: #e8799a;
    --pink-light: #f2b8ca;
    --pink-pale: #fce8ee;
    --pink-deep: #c45275;
    --white: #ffffff;
    --ink: #1a0a10;
    --ink2: #4a2535;
    --muted: #9e7585;
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(232,121,154,0.2);
  }

  html { scroll-behavior: smooth; }
  body {
    background: #0d0508;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
    min-height: 100vh;
  }

  /* --- CUSTOM CURSOR --- */
  #cursor {
    position: fixed; top: 0; left: 0; z-index: 9999;
    width: 12px; height: 12px;
    background: var(--pink);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, width 0.3s ease, height 0.3s ease, background 0.3s ease;
    mix-blend-mode: multiply;
  }
  #cursor-ring {
    position: fixed; top: 0; left: 0; z-index: 9998;
    width: 36px; height: 36px;
    border: 1px solid rgba(232,121,154,0.5);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
  }
  body:has(a:hover) #cursor, body:has(button:hover) #cursor { width: 20px; height: 20px; }
  body:has(a:hover) #cursor-ring, body:has(button:hover) #cursor-ring {
    width: 56px; height: 56px; border-color: rgba(232,121,154,0.8);
  }

  /* --- NAV --- */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
  }
  nav::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(13,5,8,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(232,121,154,0.15);
  }
  .nav-logo {
    position: relative; z-index: 1;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.9);
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .nav-pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--pink);
    animation: pulse-nav 2s cubic-bezier(0.4,0,0.6,1) infinite;
  }
  @keyframes pulse-nav {
    0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(232,121,154,0.5); }
    50% { opacity: 0.8; transform: scale(1.1); box-shadow: 0 0 0 6px rgba(232,121,154,0); }
  }
  .nav-back {
    position: relative; z-index: 1;
    font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
    text-decoration: none; cursor: none;
    transition: color 0.3s;
  }
  .nav-back:hover { color: var(--pink-light); }

  /* --- PAGE HEADER --- */
  .page-header {
    padding: 140px 48px 60px;
    max-width: 1400px; margin: 0 auto;
    animation: fade-up 0.8s ease 0.1s both;
  }
  .page-eyebrow {
    font-size: 10px; font-weight: 600; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--pink-light);
    margin-bottom: 16px;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 6vw, 80px); font-weight: 300;
    line-height: 1; letter-spacing: -0.02em; color: #fff;
  }
  .page-title em { font-style: italic; color: var(--pink-light); }

  /* --- WORKS SECTION --- */
  .works-outer {
    position: relative; z-index: 2;
    background: #0d0508;
    overflow: hidden;
  }
  .works {
    position: relative; z-index: 5;
    padding: 0 48px 120px;
    max-width: 1400px; margin: 0 auto;
  }
  .works-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 56px;
  }
  .works-title-group { display: flex; flex-direction: column; gap: 8px; }
  .section-eyebrow {
    font-size: 10px; font-weight: 600; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--pink-light);
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 4vw, 56px); font-weight: 300;
    line-height: 1; letter-spacing: -0.02em; color: #fff;
  }
  .section-title em { font-style: italic; color: var(--pink-light); }
  .works-count { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; }

  .bento-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 280px;
    gap: 14px;
  }
  .bento-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,121,154,0.18);
    border-radius: 10px;
    overflow: hidden; position: relative;
    cursor: none;
    backdrop-filter: blur(6px);
    transition: border-color 0.5s ease, transform 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s;
  }
  .bento-card:hover {
    border-color: rgba(232,121,154,0.55);
    transform: translateY(-6px) scale(1.01);
    background: rgba(255,255,255,0.07);
  }
  .bento-card.span2 { grid-column: span 2; }
  .bento-card.row2  { grid-row: span 2; }
  .bento-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(13,5,8,0.92) 0%, rgba(13,5,8,0.1) 65%);
  }
  .bento-body {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 26px;
  }
  .bento-idx {
    font-size: 10px; font-weight: 600; letter-spacing: 0.25em;
    color: rgba(242,184,202,0.45); margin-bottom: 7px;
  }
  .bento-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400; color: #fff;
    line-height: 1.15; position: relative; display: inline-block;
  }
  .bento-title::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--pink-light);
    box-shadow: 0 0 10px rgba(242,184,202,0.9), 0 0 24px rgba(232,121,154,0.5);
    transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
  }
  .bento-card:hover .bento-title::after { width: 100%; }
  .bento-tag {
    display: inline-block; margin-top: 8px;
    font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--pink-light);
    border: 1px solid rgba(242,184,202,0.25); border-radius: 3px; padding: 3px 9px;
  }
  .card-iot  { background: linear-gradient(135deg, rgba(100,20,45,0.55), rgba(60,10,30,0.65)); }
  .card-rail { background: linear-gradient(135deg, rgba(50,15,30,0.6),  rgba(90,25,50,0.5)); }
  .card-ml   { background: linear-gradient(135deg, rgba(80,15,50,0.55), rgba(45,10,30,0.7)); }
  .card-mun  { background: linear-gradient(135deg, rgba(40,10,25,0.6),  rgba(75,20,45,0.55)); }
  .card-pattern {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 130px; font-weight: 300; opacity: 0.08;
    color: var(--pink-light); pointer-events: none; user-select: none;
    transition: opacity 0.4s, transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .bento-card:hover .card-pattern { opacity: 0.14; transform: scale(1.08) rotate(3deg); }
  .bento-card.featured-glow::before {
    content: '';
    position: absolute; inset: -1px; border-radius: 11px;
    background: transparent;
    box-shadow: 0 0 0 0 rgba(232,121,154,0);
    transition: box-shadow 0.5s; z-index: 0;
  }
  .bento-card.featured-glow:hover::before {
    box-shadow: 0 0 40px 4px rgba(232,121,154,0.22), inset 0 0 40px rgba(232,121,154,0.05);
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-pulse"></div>
    Ananya Gupta
  </a>
  <a class="nav-back" href="index.html">- Back to Home</a>
</nav>

<div class="page-header">
  <div class="page-eyebrow">Selected work</div>
  <h2 class="page-title">Projects that <em>define</em> me</h2>
</div>

<div class="works-outer">
  <section class="works">
    <div class="works-header">
      <div class="works-title-group">
        <div class="section-eyebrow">02 - Selected work</div>
      </div>
      <span class="works-count">04 projects</span>
    </div>

    <div class="bento-grid">
      <div class="bento-card span2 row2 card-iot featured-glow">
        <div class="card-pattern">✦</div>
        <div class="bento-overlay"></div>
        <div class="bento-body">
          <div class="bento-idx">01 - Featured</div>
          <div class="bento-title">Wireless Gesture Car</div>
          <div class="bento-tag">IoT - Hardware</div>
        </div>
      </div>
      <div class="bento-card span2 card-rail featured-glow">
        <div class="card-pattern">◈</div>
        <div class="bento-overlay"></div>
        <div class="bento-body">
          <div class="bento-idx">02</div>
          <div class="bento-title">RailReserve System</div>
          <div class="bento-tag">Full Stack - Railway</div>
        </div>
      </div>
      <div class="bento-card card-ml featured-glow">
        <div class="card-pattern" style="font-size:80px">◇</div>
        <div class="bento-overlay"></div>
        <div class="bento-body">
          <div class="bento-idx">03</div>
          <div class="bento-title">Smart Sensor Net</div>
          <div class="bento-tag">IoT - ML</div>
        </div>
      </div>
      <div class="bento-card card-mun featured-glow">
        <div class="card-pattern" style="font-size:80px">⬡</div>
        <div class="bento-overlay"></div>
        <div class="bento-body">
          <div class="bento-idx">04</div>
          <div class="bento-title">MUN Design</div>
          <div class="bento-tag">Creative - Design</div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});
(function loopRing() {
  rx += (mx - rx) * 0.14;
  ry += (my - ry) * 0.14;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(loopRing);
})();
</script>
</body>
</html>
